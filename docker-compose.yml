services:
  postgres:
    image: postgres:16-alpine
    container_name: aii-postgres
    environment:
      POSTGRES_USER: aii
      POSTGRES_PASSWORD: aii
      POSTGRES_DB: aii
    ports:
      - "5432:5432"
    volumes:
      - aii_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aii"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  aii_pg_data:
