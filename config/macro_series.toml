# FRED series for Phase 1. `vintage_tracked = true` means use ALFRED's
# realtime_start / realtime_end to ingest every published revision as its
# own bitemporal row. `false` means we treat the series as non-revising and
# ingest the latest values with as_of = ingestion timestamp.
#
# Adding a series: append a block, run scripts/backfill_macro.py --series NEW.
# Removing: delete the block. Historical rows stay so old decisions remain
# explainable.

[[series]]
id = "FEDFUNDS"
sleeve = "policy_rate"
vintage_tracked = false
description = "Effective Fed Funds Rate (monthly)"

